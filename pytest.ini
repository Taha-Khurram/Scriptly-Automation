[pytest]
# Default: headless run of the whole suite with an HTML report.
addopts =
    -ra
    --strict-markers
    --html=reports/report.html
    --self-contained-html

testpaths = tests

markers =
    smoke: fast, high-value checks that should always pass
    auth: Tier 2 tests that require real Firebase credentials (TEST_EMAIL/TEST_PASSWORD)
    public: public-facing blog site tests
    expensive: tests that consume paid AI/API quota — run only with RUN_EXPENSIVE=1
